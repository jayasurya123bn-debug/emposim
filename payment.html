<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Complete your payment for Emposim 2026 at GTEC. Scan the UPI QR code and proceed.">
    <title>Payment | Emposim 2026 — GTEC Symposium</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ---- Payment Page Specific Styles ---- */
        .payment-summary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .payment-summary__row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-size: 0.9rem;
        }

        .payment-summary__row:last-child {
            border-top: 1px solid var(--clr-border);
            padding-top: 0.75rem;
            margin-top: 0.25rem;
            font-weight: 700;
            font-size: 1.05rem;
        }

        .payment-summary__label {
            color: var(--clr-text-muted);
        }

        .payment-summary__value {
            color: var(--clr-text);
        }

        .timeout-message {
            display: none;
            text-align: center;
            padding: 1.5rem;
            background: rgba(255, 82, 82, 0.08);
            border: 1px solid rgba(255, 82, 82, 0.3);
            border-radius: var(--radius-md);
            margin-top: 1rem;
        }

        .timeout-message h3 {
            color: var(--clr-danger);
            margin-bottom: 0.5rem;
        }

        .timeout-message p {
            color: var(--clr-text-muted);
            font-size: 0.9rem;
        }

        .timeout-message.visible {
            display: block;
            animation: fadeSlideUp 0.4s ease;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header__logo">
            <span class="header__logo-icon">🎓</span>
            Emposim
        </div>
        <nav class="header__nav">
            <a href="index.html">Home</a>
            <a href="events.html">Events</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="page-wrapper" style="padding-top: 100px;">
        <div class="container container--sm">
            <!-- Step Indicator -->
            <div class="steps">
                <div class="step completed">✓</div>
                <div class="step-line completed"></div>
                <div class="step completed">✓</div>
                <div class="step-line completed"></div>
                <div class="step completed">✓</div>
                <div class="step-line completed"></div>
                <div class="step completed">✓</div>
                <div class="step-line completed"></div>
                <div class="step completed">✓</div>
                <div class="step-line completed"></div>
                <div class="step active">6</div>
            </div>

            <!-- Payment Card -->
            <div class="card card--static slide-up">
                <div class="text-center mb-xl">
                    <h1 class="text-gradient" style="font-size: 1.8rem;">Payment Checkout</h1>
                    <p class="text-muted mt-sm">Scan the QR code below to make your payment via UPI</p>
                </div>

                <!-- Payment Summary -->
                <div class="payment-summary">
                    <div class="payment-summary__row">
                        <span class="payment-summary__label">Event</span>
                        <span class="payment-summary__value" id="pay-event">—</span>
                    </div>
                    <div class="payment-summary__row">
                        <span class="payment-summary__label">Venue</span>
                        <span class="payment-summary__value" id="pay-venue">—</span>
                    </div>
                    <div class="payment-summary__row">
                        <span class="payment-summary__label">Mode</span>
                        <span class="payment-summary__value" id="pay-mode">—</span>
                    </div>
                    <div class="payment-summary__row">
                        <span class="payment-summary__label">Total Amount</span>
                        <span class="payment-summary__value" id="pay-total" style="color: var(--clr-success);">—</span>
                    </div>
                </div>

                <!-- Countdown Timer -->
                <div class="text-center">
                    <p class="text-muted" style="font-size: 0.85rem; margin-bottom: 0.5rem;">
                        ⏱️ Complete payment within
                    </p>
                    <div class="countdown" id="countdown">
                        <span id="timer-minutes">05</span>
                        <span class="countdown__separator">:</span>
                        <span id="timer-seconds">00</span>
                    </div>
                </div>

                <!-- QR Code -->
                <div class="text-center">
                    <div class="qr-container">
                        <img id="qr-code" 
                             src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=gtec@upi%26pn=GTEC%20Emposim%26am=100"
                             alt="UPI Payment QR Code">
                    </div>
                    <p class="text-muted mt-sm" style="font-size: 0.8rem;">
                        UPI ID: <strong style="color: var(--clr-accent);">gtec@upi</strong>
                    </p>
                </div>

                <!-- Proceed Button -->
                <button id="proceed-btn" class="btn btn--success btn--lg btn--block mt-xl" onclick="handleProceed()">
                    ✅ I've Made the Payment — Proceed
                </button>

                <!-- Timeout Message (shown when timer expires) -->
                <div class="timeout-message" id="timeout-message">
                    <h3>⏰ Session Expired</h3>
                    <p>Your payment session has timed out. Please go back and try again.</p>
                    <a href="topic-details.html" class="btn btn--outline mt-md">← Go Back</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/payment.js"></script>
</body>
</html>

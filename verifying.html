<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Payment verification in progress for Emposim 2026 at GTEC.">
    <title>Verifying Payment | Emposim 2026 — GTEC Symposium</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .verifying-content {
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .verifying-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--grad-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            position: relative;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
        }

        .verifying-icon::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--clr-accent);
            animation: spin 1.2s linear infinite;
        }

        .verifying-icon::after {
            content: '';
            position: absolute;
            inset: -16px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-bottom-color: rgba(102, 126, 234, 0.3);
            animation: spin 2s linear infinite reverse;
        }

        .verifying-icon span {
            font-size: 2.5rem;
        }

        .verifying-dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 4px;
        }

        .verifying-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--clr-accent);
            animation: pulse 1.4s ease infinite;
        }

        .verifying-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .verifying-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
    </style>
</head>
<body>
    <!-- GTEC College Banner -->
    <div class="gtec-banner">
        <div class="gtec-banner__logo"><img src="https://dfhe5ze0n4pxu.cloudfront.net/College/Logos/Logo-1719515861554.jfif" alt="GTEC Logo"></div>
        <div class="gtec-banner__info">
            <div class="gtec-banner__name">Ganadipathy Tulsi's Jain Engineering College</div>
            <div class="gtec-banner__details">Approved by AICTE, Affiliated to Anna University, NAAC Accredited, ISO 9001:2015 Certified</div>
            <div class="gtec-banner__location">Kaniyambadi, Vellore – 632 102.</div>
        </div>
    </div>

    <main class="page-wrapper">
        <div class="verifying-content">
            <!-- Animated Verification Icon -->
            <div class="verifying-icon">
                <span>💳</span>
            </div>

            <h1 style="font-size: 1.6rem; margin-bottom: 0.75rem;">Verifying Your Payment</h1>
            
            <p class="text-muted" style="font-size: 1rem;">
                Please wait while we verify your transaction
                <span class="verifying-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
            </p>

            <!-- Spinner -->
            <div class="spinner spinner--lg" style="margin-top: 2rem;"></div>

            <p class="text-muted mt-xl" style="font-size: 0.8rem; opacity: 0.6;">
                Do not close this window
            </p>
        </div>
    </main>

    <script src="js/verifying.js"></script>
</body>
</html>

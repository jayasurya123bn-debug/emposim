<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Emposim — GTEC National Level Technical Symposium. Secure system verification in progress.">
    <title>Emposim 2026 | GTEC Symposium — Security Verification</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ---- Landing Page Specific Styles ---- */
        .landing {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .landing__logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: var(--grad-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        .landing__college {
            font-size: 0.85rem;
            color: var(--clr-text-muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
            animation: fadeSlideUp 0.8s ease 0.2s both;
        }

        .landing__title {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            background: var(--grad-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            animation: fadeSlideUp 0.8s ease 0.4s both;
        }

        .landing__year {
            font-size: 1.1rem;
            color: var(--clr-accent);
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 2.5rem;
            animation: fadeSlideUp 0.8s ease 0.6s both;
        }

        .verification-box {
            background: var(--clr-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--clr-glass-border);
            border-radius: var(--radius-lg);
            padding: 2.5rem 3rem;
            width: 100%;
            max-width: 480px;
            animation: fadeSlideUp 0.8s ease 0.8s both;
        }

        .verification-box__icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .verification-box__icon .shield {
            font-size: 2.5rem;
            animation: pulse 2s ease infinite;
        }

        .verification-box__title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--clr-text);
        }

        .verification-box__status {
            font-size: 0.9rem;
            color: var(--clr-accent);
            margin-bottom: 1.5rem;
            min-height: 1.4em;
            transition: opacity 0.3s ease;
        }

        .verification-box .progress-container {
            margin-bottom: 1rem;
        }

        .verification-box__percent {
            font-size: 0.8rem;
            color: var(--clr-text-muted);
            font-weight: 500;
        }

        .checkmarks {
            margin-top: 1.5rem;
            text-align: left;
        }

        .checkmark-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0;
            font-size: 0.85rem;
            color: var(--clr-text-muted);
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.4s ease;
        }

        .checkmark-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .checkmark-item.completed {
            color: var(--clr-success);
        }

        .checkmark-item__icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            flex-shrink: 0;
            border: 2px solid var(--clr-border);
            transition: all 0.3s ease;
        }

        .checkmark-item.completed .checkmark-item__icon {
            background: var(--clr-success);
            border-color: var(--clr-success);
            color: #fff;
        }

        .checkmark-item.active .checkmark-item__icon {
            border-color: var(--clr-accent);
            animation: pulse 1s ease infinite;
        }
    </style>
</head>
<body>
    <main class="landing" id="landing-page">
        <!-- GTEC Logo -->
        <div class="landing__logo">🎓</div>

        <!-- College Name -->
        <p class="landing__college">Ganadipathy Tulsi's Jain Engineering College</p>

        <!-- Event Title -->
        <h1 class="landing__title">Emposim</h1>
        <p class="landing__year">National Level Technical Symposium 2026</p>

        <!-- Verification Box -->
        <div class="verification-box">
            <div class="verification-box__icon">
                <span class="shield">🛡️</span>
            </div>
            <h2 class="verification-box__title">Performance Security Verification</h2>
            <p class="verification-box__status" id="status-text">Initializing secure connection...</p>

            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <p class="verification-box__percent" id="percent-text">0%</p>

            <!-- Check Items -->
            <div class="checkmarks">
                <div class="checkmark-item" id="check-1">
                    <span class="checkmark-item__icon">✓</span>
                    <span>Secure connection established</span>
                </div>
                <div class="checkmark-item" id="check-2">
                    <span class="checkmark-item__icon">✓</span>
                    <span>System integrity verified</span>
                </div>
                <div class="checkmark-item" id="check-3">
                    <span class="checkmark-item__icon">✓</span>
                    <span>Credentials authenticated</span>
                </div>
                <div class="checkmark-item" id="check-4">
                    <span class="checkmark-item__icon">✓</span>
                    <span>Portal ready — redirecting...</span>
                </div>
            </div>
        </div>
    </main>

    <script src="js/verification.js"></script>
</body>
</html>
